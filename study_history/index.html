<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이음이 역사 공부</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 로그인 화면 -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>역사 공부 시스템</h2>
            <input type="text" id="login-id" placeholder="사용자 ID">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button id="btn-login-submit">접속</button>
        </div>
    </div>

    <div id="app-container" style="display:none;">
        <div id="viewport">
            <header id="region-header"></header> <!-- 상단 권역 눈금자 -->
            <div id="content-body">
                <aside id="year-ruler"></aside> <!-- 좌측 연도 눈금자 -->
                <main id="main-display">
                    <div id="scroll-hint">💡 Shift + 마우스 휠로 좌우 이동이 가능합니다.</div>
                    <div id="timeline-grid">
                        <svg id="link-layer"></svg> <!-- 연결선 레이어 -->
                        <div id="event-container"></div> <!-- 이벤트 노드 -->
                    </div>
                </main>
            </div>
        </div>

        <!-- 우측 입력 툴바 -->
        <aside id="toolbar">
            <div class="input-group">
                <input type="number" id="in-startYear" placeholder="연도 (BC는 마이너스)">
                <input type="text" id="in-eventName" placeholder="사건명 (필수)">
                <input type="text" id="in-eventPlace" placeholder="발생 장소 (필수)">
                <select id="in-placeGroup"></select>
                <textarea id="in-memo" placeholder="메모 (AI 요약 입력 가능)"></textarea>
            </div>
            <div class="button-group">
                <button id="btn-add" class="primary">추가 / 수정</button>
                <button id="btn-search">검색</button>
                <div id="search-results" class="hidden"></div> <!-- 검색 리스트 -->
                <button id="btn-ai" class="ai-btn">AI 검색 (Gemini)</button>
                <button id="btn-delete" class="danger">삭제</button>
            </div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
