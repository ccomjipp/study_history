<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이음이 역사 공부</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h2>역사 공부 시스템</h2>
            <input type="text" id="login-id" placeholder="사용자 ID">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button id="btn-login-submit">접속</button>
        </div>
    </div>

    <div id="app-container" style="display:none;">
        <div id="viewport">
            <header id="region-header"></header>
            <div id="content-body">
                <aside id="year-ruler"></aside>
                <main id="main-display">
                    <div id="timeline-grid">
                        <svg id="link-layer"></svg>
                        <div id="event-container"></div>
                    </div>
                </main>
            </div>
        </div>

        <aside id="toolbar">
            <div class="input-group">
                <input type="number" id="in-startYear" placeholder="연도 (BC는 마이너스)">
                <input type="text" id="in-startDate" placeholder="날짜 (예: 5월 15일, 선택사항)">
                <input type="text" id="in-eventName" placeholder="사건명 (필수)">
                <input type="text" id="in-eventPlace" placeholder="발생 장소 (필수)">
                <select id="in-placeGroup"></select>
                <textarea id="in-memo" placeholder="메모 (AI 요약 입력 가능)"></textarea>
            </div>
            <div class="button-group">
                <button id="btn-add" class="primary" data-tooltip="새 사건 추가 / 기존 사건 수정">💾</button>
                <button id="btn-search" data-tooltip="역사 사건 이름 검색">🔍</button>
                <button id="btn-delete" class="danger" data-tooltip="선택한 역사 사건 삭제">🗑️</button>
            </div>

            <div id="search-results" class="hidden"></div>
            <div id="search-results" class="hidden"></div>

            <div class="input-group" style="margin-top: 15px; display: flex; flex-direction: column; gap: 5px;">
                <label style="font-size: 12px; font-weight: bold; color: #7f8c8d; text-align: left;">📋 전체 사건 목록 (가나다순)</label>
                <div id="total-event-list"></div>
            </div>
            
            <div id="scroll-hint">💡 Shift + 마우스 휠로 좌우 이동이 가능합니다.</div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
